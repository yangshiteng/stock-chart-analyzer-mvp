<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Chart Analyzer</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <section class="panel">
        <p id="popupEyebrow" class="eyebrow">Chrome Extension MVP</p>
        <h1 id="popupTitle">Stock Chart Analyzer</h1>
        <p id="statusText" class="status-text">Checking extension status...</p>

        <label class="language-picker">
          <span id="popupLanguageLabel">Language</span>
          <select id="popupLanguageSelect">
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
        </label>

        <section class="popup-settings">
          <h2 id="popupApiSetupTitle">OpenAI Setup</h2>
          <label class="language-picker">
            <span id="popupApiKeyLabel">OpenAI API Key</span>
            <input id="popupApiKeyInput" type="password" autocomplete="off" placeholder="sk-...">
          </label>
          <div class="popup-settings-actions">
            <button id="popupSaveKeyButton" class="primary-button" type="button">Save Key</button>
            <button id="popupClearKeyButton" class="secondary-button" type="button">Clear Key</button>
          </div>
          <p id="popupApiKeyStatus" class="settings-status">No API key saved yet.</p>
        </section>

        <div class="actions">
          <button id="startButton" class="primary-button" type="button">Start</button>
        </div>

        <div class="details">
          <p id="detailText">Click Start to validate the current tab. If it looks like a stock chart, choose Buy or Sell inside the side panel.</p>
        </div>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
